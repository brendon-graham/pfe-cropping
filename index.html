<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PFE Cropping</title>
<style>
:root {
  --soil: #1B3A1B;
  --leaf: #2D5A27;
  --lime: #7CB342;
  --straw: #F5F0E8;
  --card: #FFFFFF;
  --border: #DDD;
  --muted: #888;
  --warn: #E65100;
  --danger: #B71C1C;
  --ok: #2E7D32;
  --info: #1565C0;
  --text: #1A1A1A;
  --tab-h: 48px;
  --header-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; background: var(--straw); color: var(--text); }
header {
  background: var(--soil); color: #fff; height: var(--header-h);
  display: flex; align-items: center; padding: 0 20px; gap: 16px; position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
header .sub { font-size: 11px; color: #9E9E9E; }
header .spacer { flex: 1; }
#sync-pill {
  font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #333; cursor: pointer;
}
#sync-pill.ok { background: var(--ok); }
#sync-pill.warn { background: var(--warn); }
#sync-pill.info { background: var(--info); }
nav {
  background: var(--leaf); display: flex; overflow-x: auto; padding: 0 12px;
  position: sticky; top: var(--header-h); z-index: 99; scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
nav button {
  background: none; border: none; color: rgba(255,255,255,.7); font-size: 13px; font-weight: 500;
  padding: 0 16px; height: var(--tab-h); cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent;
}
nav button.active { color: #fff; border-bottom-color: var(--lime); }
nav button:hover { color: #fff; }
main { padding: 16px; max-width: 1400px; margin: 0 auto; }
.tab { display: none; }
.tab.active { display: block; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
.card { background: var(--card); border-radius: 8px; padding: 16px; border: 1px solid var(--border); }
.card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.card .value { font-size: 28px; font-weight: 700; line-height: 1; }
.card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.card.surplus .value { color: var(--ok); }
.card.deficit .value { color: var(--danger); }

/* Tables */
.tbl-wrap { background: var(--card); border-radius: 8px; border: 1px solid var(--border); overflow: auto; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--soil); color: #fff; padding: 8px 10px; text-align: left; font-weight: 600; font-size: 12px; white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid #F0F0F0; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAFA; }
.section-row td { background: #F5F5F5; font-weight: 600; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.total-row td { background: var(--soil); color: #fff; font-weight: 700; }

/* Inline edit inputs */
td input, td select {
  border: 1px solid transparent; padding: 2px 4px; width: 100%; background: transparent;
  font-size: 13px; font-family: inherit; color: inherit; border-radius: 3px;
}
td input:focus, td select:focus { border-color: var(--lime); outline: none; background: #fff; }
td input.num { text-align: right; }

/* Buttons */
.btn { padding: 7px 14px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--leaf); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
.del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
.del-btn:hover { color: var(--danger); }
.add-row { padding: 8px 12px; text-align: left; border-top: 1px solid var(--border); }
.add-row button { background: none; border: none; color: var(--leaf); cursor: pointer; font-size: 13px; font-weight: 600; }
.add-row button:hover { text-decoration: underline; }

/* Feed budget bars */
.fb-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 900px) { .fb-section { grid-template-columns: 1fr; } }
.fb-box { background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
.fb-box-hdr { background: var(--soil); color: #fff; padding: 10px 14px; border-radius: 8px 8px 0 0; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; }
.fb-summary { background: var(--card); border-radius: 8px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
.fb-bar-wrap { flex: 1; min-width: 200px; }
.fb-bar { height: 20px; background: #EEE; border-radius: 10px; overflow: hidden; }
.fb-bar-fill { height: 100%; border-radius: 10px; background: var(--ok); transition: width .3s; }
.fb-bar-fill.over { background: var(--warn); }
.flags-box { background: var(--card); border-radius: 8px; border: 1px solid var(--border); padding: 0; margin-bottom: 16px; overflow: hidden; }
.flags-box-hdr { background: var(--soil); color: #fff; padding: 10px 14px; font-weight: 700; font-size: 13px; }
.flag-item { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
.flag-item:last-child { border-bottom: none; }
.flag-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.flag-dot.red { background: var(--danger); }
.flag-dot.amber { background: var(--warn); }
.flag-dot.green { background: var(--ok); }
.flag-title { font-weight: 600; font-size: 13px; }
.flag-desc { font-size: 12px; color: var(--muted); }
.no-flags { padding: 16px 14px; color: var(--muted); font-style: italic; font-size: 13px; }

/* Toolbar */
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.toolbar .spacer { flex: 1; }
#sync-log { font-size: 11px; color: var(--muted); }

/* Tag chips */
.tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.tag-kale { background: #E8F5E9; color: #1B5E20; }
.tag-swedes { background: #FFF3E0; color: #E65100; }
.tag-beet { background: #FCE4EC; color: #880E4F; }
.tag-maize { background: #FFFDE7; color: #F57F17; }
.tag-rape { background: #F3E5F5; color: #4A148C; }
.tag-triticale { background: #E3F2FD; color: #0D47A1; }
.tag-clover { background: #E0F2F1; color: #004D40; }
.tag-other { background: #ECEFF1; color: #37474F; }

/* Settings / AI */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 700px; }
@media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--muted); }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; font-family: inherit;
}
.form-group textarea { min-height: 160px; resize: vertical; font-family: monospace; font-size: 12px; }
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--lime); display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<header>
  <div>
    <h1>PFE Cropping</h1>
    <div class="sub" id="hdr-sub">Loading...</div>
  </div>
  <div class="spacer"></div>
  <span id="sync-log"></span>
  <div id="sync-pill" onclick="manualSync()">Offline</div>
</header>

<nav>
  <button class="active" onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('crop')">Crop Plan</button>
  <button onclick="showTab('stock')">Stock Req</button>
  <button onclick="showTab('feed')">Feed Budget</button>
  <button onclick="showTab('financial')">Financial</button>
  <button onclick="showTab('history')">History</button>
  <button onclick="showTab('ai')">AI Advisor</button>
  <button onclick="showTab('settings')">Settings</button>
</nav>

<main>
  <div id="tab-dashboard" class="tab active"></div>
  <div id="tab-crop" class="tab"></div>
  <div id="tab-stock" class="tab"></div>
  <div id="tab-feed" class="tab"></div>
  <div id="tab-financial" class="tab"></div>
  <div id="tab-history" class="tab"></div>
  <div id="tab-ai" class="tab"></div>
  <div id="tab-settings" class="tab"></div>
</main>

<script>
// -- CONSTANTS --
const APP_VER = '2.0';
const NS = 'crop2_';
const YEAR = '2026/27';

const CROPS = ['Kale','Swedes','Fodder Beet','Lifting Beet','Maize','Rape','Triticale','Clover','Other'];

// Gross margin templates ($/ha defaults from spreadsheet)
const GM = {
  'Kale':        { yieldKgHA: 12000, seedHA: 147,  chemHA: 435,  fertHA: 566, opsHA: 295 },
  'Swedes':      { yieldKgHA: 14000, seedHA: 240,  chemHA: 543,  fertHA: 535, opsHA: 395 },
  'Fodder Beet': { yieldKgHA: 20000, seedHA: 430,  chemHA: 1078, fertHA: 335, opsHA: 378 },
  'Lifting Beet':{ yieldKgHA: 16000, seedHA: 521,  chemHA: 1078, fertHA: 335, opsHA: 378 },
  'Maize':       { yieldKgHA: 18000, seedHA: 999,  chemHA: 326,  fertHA: 892, opsHA: 525 },
  'Rape':        { yieldKgHA: 8000,  seedHA: 195,  chemHA: 195,  fertHA: 163, opsHA: 160 },
  'Triticale':   { yieldKgHA: 6000,  seedHA: 250,  chemHA: 195,  fertHA: 163, opsHA: 160 },
  'Clover':      { yieldKgHA: 8000,  seedHA: 80,   chemHA: 120,  fertHA: 200, opsHA: 180 },
  'Other':       { yieldKgHA: 10000, seedHA: 200,  chemHA: 300,  fertHA: 300, opsHA: 300 },
};

// DM% per crop (fresh weight to dry matter)
const DM_PCT = {
  'Kale': 0.13, 'Swedes': 0.12, 'Fodder Beet': 0.17, 'Lifting Beet': 0.17,
  'Maize': 0.32, 'Rape': 0.13, 'Triticale': 0.87, 'Clover': 0.25, 'Other': 0.15
};

const CROP_TAG = {
  'Kale':'tag-kale','Swedes':'tag-swedes','Fodder Beet':'tag-beet','Lifting Beet':'tag-beet',
  'Maize':'tag-maize','Rape':'tag-rape','Triticale':'tag-triticale','Clover':'tag-clover','Other':'tag-other'
};

// -- STATE --
let cropPlan   = [];  // { id, paddock, crop, ha, drillDate, yieldKgHA, seedHA, chemHA, fertHA, opsHA, notes }
let stockReq   = [];  // { id, cls, species, headPrev, headCurr, kgDMday, period, days, feedSource, notes }
let supplements = []; // { id, name, type, kgDM, costPerKgDM, notes }
let history    = [];  // { id, year, paddock, crop, ha, yieldBudget, yieldActual, notes }
let aiNotes    = '';
let settings   = { scriptUrl: '', year: YEAR, disconnected: false };
let lastTs     = 0;
let syncPending = false;
let pollTimer  = null;
let activeTab  = 'dashboard';

// -- PERSISTENCE --
function save() {
  localStorage.setItem(NS+'crop', JSON.stringify(cropPlan));
  localStorage.setItem(NS+'stock', JSON.stringify(stockReq));
  localStorage.setItem(NS+'supps', JSON.stringify(supplements));
  localStorage.setItem(NS+'history', JSON.stringify(history));
  localStorage.setItem(NS+'ai', aiNotes);
  localStorage.setItem(NS+'settings', JSON.stringify(settings));
  schedulePush();
}

function load() {
  cropPlan    = JSON.parse(localStorage.getItem(NS+'crop')     || '[]');
  stockReq    = JSON.parse(localStorage.getItem(NS+'stock')    || '[]');
  supplements = JSON.parse(localStorage.getItem(NS+'supps')    || '[]');
  history     = JSON.parse(localStorage.getItem(NS+'history')  || '[]');
  aiNotes     = localStorage.getItem(NS+'ai') || '';
  settings    = JSON.parse(localStorage.getItem(NS+'settings') || '{}');
  settings.year = settings.year || YEAR;
  settings.scriptUrl = settings.scriptUrl || 'https://script.google.com/macros/s/AKfycbxaPkRHrWqjfqgMCaV-s-uZYSvVIFgOyC5IpKg5J6_CLv_5gEkP7_SukyHOYhTvEYI2jQ/exec';
  lastTs      = Number(localStorage.getItem(NS+'lastTs') || 0);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function n(v) { return Number(v) || 0; }
function fmt$(v) { return '$' + Math.round(n(v)).toLocaleString(); }
function fmtT(v) { return Math.round(n(v)/1000).toLocaleString() + 't'; }
function fmtDM(v) { return Math.round(n(v)).toLocaleString() + ' kg'; }

// -- COMPUTED TOTALS --
function totalDemand() {
  return stockReq.reduce((s, r) => s + n(r.headCurr) * n(r.kgDMday) * n(r.days), 0);
}

function cropSupply() {
  return cropPlan.reduce((s, c) => {
    return s + n(c.ha) * n(c.yieldKgHA) * (DM_PCT[c.crop] || 0.15) * 0.90;
  }, 0);
}

function suppSupply() {
  return supplements.reduce((s, x) => s + n(x.kgDM), 0);
}

function totalSupply() { return cropSupply() + suppSupply(); }
function surplus() { return totalSupply() - totalDemand(); }

function totalCropCost() {
  return cropPlan.reduce((s, c) => {
    return s + n(c.ha) * (n(c.seedHA) + n(c.chemHA) + n(c.fertHA) + n(c.opsHA));
  }, 0);
}

function totalSuppCost() {
  return supplements.reduce((s, x) => s + n(x.kgDM) * n(x.costPerKgDM), 0);
}

function totalHa() { return cropPlan.reduce((s, c) => s + n(c.ha), 0); }

// -- TABS --
function showTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const idx = ['dashboard','crop','stock','feed','financial','history','ai','settings'].indexOf(name);
  document.querySelectorAll('nav button')[idx].classList.add('active');
  renderTab(name);
}

function renderTab(name) {
  if (name === 'dashboard')  renderDashboard();
  if (name === 'crop')       renderCrop();
  if (name === 'stock')      renderStock();
  if (name === 'feed')       renderFeed();
  if (name === 'financial')  renderFinancial();
  if (name === 'history')    renderHistory();
  if (name === 'ai')         renderAI();
  if (name === 'settings')   renderSettings();
}

function renderAll() {
  document.getElementById('hdr-sub').textContent = settings.year + ' · ' + APP_VER;
  renderTab(activeTab);
}

// -- DASHBOARD --
function renderDashboard() {
  const dem = totalDemand();
  const sup = totalSupply();
  const sur = surplus();
  const pct = dem > 0 ? Math.min(100, Math.round(sup / dem * 100)) : 0;
  const flags = buildFlags();

  document.getElementById('tab-dashboard').innerHTML = `
    <div class="cards">
      <div class="card">
        <div class="label">Total Crop Ha</div>
        <div class="value">${totalHa().toFixed(1)}</div>
        <div class="sub">${cropPlan.length} paddocks</div>
      </div>
      <div class="card">
        <div class="label">DM Supply</div>
        <div class="value">${fmtT(sup)}</div>
        <div class="sub">Crops + supplements</div>
      </div>
      <div class="card">
        <div class="label">DM Demand</div>
        <div class="value">${fmtT(dem)}</div>
        <div class="sub">All stock classes</div>
      </div>
      <div class="card ${sur >= 0 ? 'surplus' : 'deficit'}">
        <div class="label">Surplus / Deficit</div>
        <div class="value">${sur >= 0 ? '+' : ''}${fmtT(sur)}</div>
        <div class="sub">Supply ${pct}% of demand</div>
      </div>
      <div class="card">
        <div class="label">Programme Cost</div>
        <div class="value">${fmt$(totalCropCost() + totalSuppCost())}</div>
        <div class="sub">${settings.year} budget</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;" class="dash-lower">
      <div>
        <div class="section-title" style="font-size:14px;">Crop Programme — ${settings.year}</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Crop</th><th style="text-align:right">Ha</th><th style="text-align:right">DM Supply</th><th style="text-align:right">Cost</th></tr></thead>
            <tbody>${renderCropSummaryRows()}</tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="section-title" style="font-size:14px;">Flags</div>
        <div class="flags-box">
          <div class="flags-box-hdr">Auto-generated alerts</div>
          ${flags.length ? flags.map(f => `
            <div class="flag-item">
              <div class="flag-dot ${f.level}"></div>
              <div><div class="flag-title">${f.title}</div><div class="flag-desc">${f.desc}</div></div>
            </div>`).join('') : '<div class="no-flags">No flags — data looks good.</div>'}
        </div>
      </div>
    </div>
  `;
}

function renderCropSummaryRows() {
  const byType = {};
  cropPlan.forEach(c => {
    if (!byType[c.crop]) byType[c.crop] = { ha: 0, dm: 0, cost: 0 };
    byType[c.crop].ha   += n(c.ha);
    byType[c.crop].dm   += n(c.ha) * n(c.yieldKgHA) * (DM_PCT[c.crop] || 0.15) * 0.9;
    byType[c.crop].cost += n(c.ha) * (n(c.seedHA) + n(c.chemHA) + n(c.fertHA) + n(c.opsHA));
  });
  if (!Object.keys(byType).length) return '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:16px;">No crops entered yet</td></tr>';
  return Object.entries(byType).map(([crop, v]) => `
    <tr>
      <td><span class="tag ${CROP_TAG[crop] || 'tag-other'}">${crop}</span></td>
      <td style="text-align:right">${v.ha.toFixed(1)}</td>
      <td style="text-align:right">${fmtT(v.dm)}</td>
      <td style="text-align:right">${fmt$(v.cost)}</td>
    </tr>`).join('');
}

function buildFlags() {
  const flags = [];
  const sur = surplus();
  if (sur < 0) flags.push({ level:'red', title:'Feed Deficit', desc:`${fmtT(Math.abs(sur))} DM shortfall. Add supplements or increase crop area.` });
  else if (sur < 200000) flags.push({ level:'amber', title:'Tight Feed Margin', desc:`Only ${fmtT(sur)} surplus. Limited buffer for poor yields.` });
  cropPlan.forEach(c => {
    if (n(c.yieldKgHA) < (GM[c.crop]?.yieldKgHA || 10000) * 0.75) {
      flags.push({ level:'amber', title:`Low yield budget — ${c.paddock}`, desc:`${c.crop} budgeted at ${n(c.yieldKgHA).toLocaleString()} kg/ha vs ${GM[c.crop]?.yieldKgHA?.toLocaleString()} kg/ha typical.` });
    }
  });
  if (totalDemand() === 0) flags.push({ level:'amber', title:'No stock entered', desc:'Add stock classes in Stock Req to calculate feed demand.' });
  if (cropPlan.length === 0) flags.push({ level:'amber', title:'No crop plan entered', desc:'Add paddocks in Crop Plan to calculate feed supply.' });
  return flags;
}

// -- CROP PLAN --
function renderCrop() {
  const byType = {};
  cropPlan.forEach(c => {
    if (!byType[c.crop]) byType[c.crop] = [];
    byType[c.crop].push(c);
  });

  const cropOptions = CROPS.map(c => `<option>${c}</option>`).join('');
  let rows = '';

  Object.entries(byType).forEach(([crop, rows_]) => {
    const totHa = rows_.reduce((s,c)=>s+n(c.ha),0);
    const totCost = rows_.reduce((s,c)=>s+n(c.ha)*(n(c.seedHA)+n(c.chemHA)+n(c.fertHA)+n(c.opsHA)),0);
    const totDM = rows_.reduce((s,c)=>s+n(c.ha)*n(c.yieldKgHA)*(DM_PCT[crop]||.15)*.9,0);
    rows += `<tr class="section-row"><td colspan="2"><span class="tag ${CROP_TAG[crop]||'tag-other'}">${crop}</span></td>
      <td style="text-align:right">${totHa.toFixed(1)} ha</td><td></td>
      <td style="text-align:right">${n(GM[crop]?.yieldKgHA).toLocaleString()}</td>
      <td style="text-align:right" colspan="4">${fmtT(totDM)} DM</td>
      <td style="text-align:right">${fmt$(totCost)}</td><td></td></tr>`;
    rows_.forEach(c => { rows += cropRow(c, cropOptions); });
  });

  if (!rows) rows = `<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--muted);">No paddocks yet — click Add Paddock below</td></tr>`;

  document.getElementById('tab-crop').innerHTML = `
    <div class="toolbar">
      <div class="section-title" style="flex:1;border:none;margin:0">Crop Plan — ${settings.year}</div>
      <button class="btn btn-primary" onclick="addCropRow()">+ Add Paddock</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Paddock</th><th>Crop</th><th style="text-align:right">Ha</th>
          <th>Drill Date</th><th style="text-align:right">Yield kg/ha</th>
          <th style="text-align:right">Seed $/ha</th><th style="text-align:right">Chem $/ha</th>
          <th style="text-align:right">Fert $/ha</th><th style="text-align:right">Ops $/ha</th>
          <th style="text-align:right">Total $</th><th></th>
        </tr></thead>
        <tbody id="crop-tbody">${rows}</tbody>
      </table>
      <div class="add-row"><button onclick="addCropRow()">+ Add paddock</button></div>
    </div>`;
}

function cropRow(c, cropOptions) {
  const cost = n(c.ha) * (n(c.seedHA) + n(c.chemHA) + n(c.fertHA) + n(c.opsHA));
  const opts = CROPS.map(x => `<option${x===c.crop?' selected':''}>${x}</option>`).join('');
  return `<tr id="cr-${c.id}">
    <td><input value="${c.paddock||''}" onchange="updateCrop('${c.id}','paddock',this.value)" placeholder="Paddock name"></td>
    <td><select onchange="cropTypeChanged('${c.id}',this.value)">${opts}</select></td>

function addCropRow() {
  const crop = 'Kale';
  const gm = GM[crop];
  const c = { id: uid(), paddock:'', crop, ha:'', drillDate:'', yieldKgHA: gm.yieldKgHA, seedHA: gm.seedHA, chemHA: gm.chemHA, fertHA: gm.fertHA, opsHA: gm.opsHA, notes:'' };
  cropPlan.push(c);
  save();
  renderCrop();
  const row = document.getElementById('cr-' + c.id);
  if (row) row.querySelector('input').focus();
}

function updateCrop(id, field, val) {
  const c = cropPlan.find(x => x.id === id);
  if (!c) return;
  c[field] = val;
  save();
  if (['ha','seedHA','chemHA','fertHA','opsHA'].includes(field)) {
    const cost = n(c.ha) * (n(c.seedHA) + n(c.chemHA) + n(c.fertHA) + n(c.opsHA));
    const row = document.getElementById('cr-' + id);
    if (row) row.querySelectorAll('td')[9].textContent = fmt$(cost);
  }
}

function cropTypeChanged(id, crop) {
  const c = cropPlan.find(x => x.id === id);
  if (!c) return;
  c.crop = crop;
  const gm = GM[crop];
  if (gm) { c.yieldKgHA = gm.yieldKgHA; c.seedHA = gm.seedHA; c.chemHA = gm.chemHA; c.fertHA = gm.fertHA; c.opsHA = gm.opsHA; }
  save();
  renderCrop();
}

function deleteCrop(id) {
  cropPlan = cropPlan.filter(x => x.id !== id);
  save();
  renderCrop();
}

            <td colspan="7">Cattle total</td>
            <td style="text-align:right">${fmtDM(cattleDM)}</td><td></td>
          </tr>
          <tr class="total-row">
            <td colspan="7">Grand total</td>
            <td style="text-align:right">${fmtDM(totalDemand())}</td><td></td>
          </tr>
        </tbody>
      </table>

        <button onclick="addStockRow('Deer')">+ Deer class</button> &nbsp;

function stockRow(r) {
  const total = n(r.headCurr) * n(r.kgDMday) * n(r.days);

function addStockRow(species) {
  const r = { id: uid(), species, cls:'', headPrev:'', headCurr:'', kgDMday:'', period:'15 May - 15 Sep', days: 120, feedSource:'', notes:'' };
  stockReq.push(r);
  save();
  renderStock();
  const row = document.getElementById('sr-' + r.id);
  if (row) row.querySelector('input').focus();
}

function updateStock(id, field, val) {
  const r = stockReq.find(x => x.id === id);
  if (r) { r[field] = val; save(); }
}

function updateStockCalc(id, field, val) {
  const r = stockReq.find(x => x.id === id);

function deleteStock(id) {

}

  const cSup = cropSupply();

  const pct  = dem > 0 ? Math.min(110, Math.round(sup/dem*100)) : 0;

  const suppOpts = `<option value="Silage">Silage</option><option value="Balage">Balage</option><option value="Hay">Hay</option><option value="Maize Silage">Maize Silage</option><option value="Lucerne Silage">Lucerne Silage</option><option value="Supplement">Supplement</option>`;

    const cost = n(x.kgDM) * n(x.costPerKgDM);

    return `<tr>
      <td><span class="tag ${CROP_TAG[c.crop]||'tag-other'}">${c.crop}</span></td>

        <div style="font-size:22px;font-weight:700">${fmtT(dem)}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:2px">SUPPLY</div>
        <div style="font-size:22px;font-weight:700">${fmtT(sup)}</div>
      </div>
      <div class="fb-bar-wrap">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Supply covers ${pct}% of demand</div>
        <div class="fb-bar"><div class="fb-bar-fill ${pct>=100?'':'over'}" style="width:${pct}%"></div></div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:2px">${sur >= 0 ? 'SURPLUS' : 'DEFICIT'}</div>
        <div style="font-size:22px;font-weight:700;color:${sur>=0?'var(--ok)':'var(--danger)'}">
          ${sur >= 0 ? '+' : ''}${fmtT(sur)}
        </div>
      </div>
    </div>

    <div class="fb-section">
      <div>
        <div class="section-title" style="font-size:14px;">Supply from Crops <span style="font-size:12px;font-weight:400;color:var(--muted)">(from Crop Plan, 10% wastage applied)</span></div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Crop</th><th>Paddock</th><th style="text-align:right">Ha</th><th style="text-align:right">Yield kg/ha</th><th style="text-align:right">DM%</th><th style="text-align:right">kgDM</th></tr></thead>

                <td style="text-align:right;font-weight:600">${fmtDM(total)}</td>
              </tr>`;
            }).join('') : '<tr><td colspan="8" style="color:var(--muted);padding:12px">No stock entered — add in Stock Req tab</td></tr>'}
            <tr class="total-row"><td colspan="7">Grand total demand</td><td style="text-align:right">${fmtDM(dem)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

// -- FINANCIAL --
function renderFinancial() {
  const byType = {};
  cropPlan.forEach(c => {
    if (!byType[c.crop]) byType[c.crop] = { ha: 0, seed:0, chem:0, fert:0, ops:0 };
    const h = n(c.ha);
    byType[c.crop].ha   += h;
    byType[c.crop].seed += h * n(c.seedHA);
    byType[c.crop].chem += h * n(c.chemHA);
    byType[c.crop].fert += h * n(c.fertHA);
    byType[c.crop].ops  += h * n(c.opsHA);
  });

  const cropRows = Object.entries(byType).map(([crop, v]) => {
    const total = v.seed + v.chem + v.fert + v.ops;
    return `<tr>
      <td><span class="tag ${CROP_TAG[crop]||'tag-other'}">${crop}</span></td>
      <td style="text-align:right">${v.ha.toFixed(1)}</td>
      <td style="text-align:right">${fmt$(v.seed)}</td>
      <td style="text-align:right">${fmt$(v.chem)}</td>
      <td style="text-align:right">${fmt$(v.fert)}</td>
      <td style="text-align:right">${fmt$(v.ops)}</td>
      <td style="text-align:right;font-weight:700">${fmt$(total)}</td>
      <td style="text-align:right;color:var(--muted)">${fmt$(total / (v.ha||1))}/ha</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="color:var(--muted);padding:12px">No crops entered</td></tr>';

  const suppRows = supplements.map(x => {
    const cost = n(x.kgDM) * n(x.costPerKgDM);
    return `<tr><td>${x.name||'-'}</td><td>${x.type||'-'}</td><td style="text-align:right">${fmtDM(x.kgDM)}</td><td style="text-align:right">${n(x.costPerKgDM).toFixed(3)}</td><td style="text-align:right;font-weight:700">${fmt$(cost)}</td></tr>`;
  }).join('') || '<tr><td colspan="5" style="color:var(--muted);padding:12px">No supplements entered</td></tr>';

  const grandTotal = totalCropCost() + totalSuppCost();

  document.getElementById('tab-financial').innerHTML = `
    <div class="cards" style="max-width:700px">
      <div class="card"><div class="label">Crop Establishment</div><div class="value">${fmt$(totalCropCost())}</div></div>
      <div class="card"><div class="label">Supplements</div><div class="value">${fmt$(totalSuppCost())}</div></div>
      <div class="card"><div class="label">Total Programme</div><div class="value">${fmt$(grandTotal)}</div></div>
    </div>

    <div class="section-title">Crop Establishment Costs</div>
    <div class="tbl-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr><th>Crop</th><th style="text-align:right">Ha</th><th style="text-align:right">Seed</th><th style="text-align:right">Chem</th><th style="text-align:right">Fert</th><th style="text-align:right">Ops</th><th style="text-align:right">Total</th><th style="text-align:right">$/ha</th></tr></thead>
        <tbody>
          ${cropRows}
          <tr class="total-row">
            <td>Total</td>
            <td style="text-align:right">${totalHa().toFixed(1)}</td>
            <td colspan="4"></td>
            <td style="text-align:right">${fmt$(totalCropCost())}</td>
            <td style="text-align:right">${fmt$(totalCropCost()/(totalHa()||1))}/ha</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="section-title">Supplement / Feed Costs</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Name</th><th>Type</th><th style="text-align:right">kgDM</th><th style="text-align:right">$/kgDM</th><th style="text-align:right">Total Cost</th></tr></thead>
        <tbody>
          ${suppRows}
          <tr class="total-row"><td colspan="4">Total supplements</td><td style="text-align:right">${fmt$(totalSuppCost())}</td></tr>
        </tbody>
      </table>
    </div>`;
}

  const rows = history.length ? history.map(h => {
    const variance = h.yieldActual && h.yieldBudget ? Math.round((h.yieldActual/h.yieldBudget - 1)*100) : null;
    const varText = variance !== null ? `<span style="color:${variance>=0?'var(--ok)':'var(--danger)'}">${variance>=0?'+':''}${variance}%</span>` : '-';
    return `<tr id="hr-${h.id}">
      <td><input value="${h.year||''}" onchange="updateHistory('${h.id}','year',this.value)" style="width:70px"></td>
      <td><input value="${h.paddock||''}" onchange="updateHistory('${h.id}','paddock',this.value)"></td>

      <td><input class="num" type="number" value="${h.ha||''}" onchange="updateHistory('${h.id}','ha',this.value)" style="width:60px"></td>
      <td><input class="num" type="number" value="${h.yieldBudget||''}" onchange="updateHistory('${h.id}','yieldBudget',this.value)" style="width:80px"></td>
      <td><input class="num" type="number" value="${h.yieldActual||''}" onchange="updateHistory('${h.id}','yieldActual',this.value)" style="width:80px"></td>
      <td style="text-align:right">${varText}</td>
      <td><input value="${h.notes||''}" onchange="updateHistory('${h.id}','notes',this.value)" placeholder="Notes"></td>
      <td><button class="del-btn" onclick="deleteHistory('${h.id}')">x</button></td>
    </tr>`;
  }).join('') : '<tr><td colspan="9" style="color:var(--muted);padding:16px;text-align:center">No history yet — add prior year actuals here</td></tr>';

  document.getElementById('tab-history').innerHTML = `
    <div class="toolbar">
      <div class="section-title" style="flex:1;border:none;margin:0">Yield History</div>

        <tbody>${rows}</tbody>
      </table>
      <div class="add-row"><button onclick="addHistoryRow()">+ Add record</button></div>
    </div>`;
}

function renderSettings() {
  document.getElementById('tab-settings').innerHTML = `
    <div class="section-title">Settings</div>
    <div class="settings-grid">
      <div>
        <div class="form-group">
          <label>Current Year</label>
          <input id="s-year" value="${settings.year||''}">
        </div>
        <div class="form-group">
          <label>Apps Script URL</label>
          <input id="s-url" value="${settings.scriptUrl||''}" placeholder="https://script.google.com/macros/s/...">
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-primary" onclick="saveSettings()">Save</button>
          <button class="btn btn-ghost" onclick="toggleDisconnect()">${settings.disconnected?'Reconnect Sync':'Disconnect Sync'}</button>
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--muted)" id="sync-status-txt">
          ${settings.disconnected ? 'Sync disconnected.' : 'Sync active.'}
        </div>
      </div>
      <div>
        <div class="form-group">
          <label>Sync log</label>
          <textarea id="sync-log-area" readonly style="min-height:120px;font-size:11px"></textarea>
        </div>
      </div>
    </div>
    <div style="margin-top:24px">
      <div class="section-title" style="font-size:14px;">Gross Margin Templates (defaults when crop type selected)</div>
      <div class="tbl-wrap" style="max-width:700px">
        <table>
          <thead><tr><th>Crop</th><th style="text-align:right">Yield kg/ha</th><th style="text-align:right">Seed $/ha</th><th style="text-align:right">Chem $/ha</th><th style="text-align:right">Fert $/ha</th><th style="text-align:right">Ops $/ha</th><th style="text-align:right">Total $/ha</th></tr></thead>
          <tbody>
            ${CROPS.filter(c=>c!=='Other').map(c => {
              const g = GM[c];
              const tot = g.seedHA + g.chemHA + g.fertHA + g.opsHA;
              return `<tr><td><span class="tag ${CROP_TAG[c]||'tag-other'}">${c}</span></td>
                <td style="text-align:right">${g.yieldKgHA.toLocaleString()}</td>
                <td style="text-align:right">${g.seedHA}</td>
                <td style="text-align:right">${g.chemHA}</td>
                <td style="text-align:right">${g.fertHA}</td>
                <td style="text-align:right">${g.opsHA}</td>
                <td style="text-align:right;font-weight:700">${fmt$(tot)}/ha</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function saveSettings() {
  settings.year        = document.getElementById('s-year')?.value || settings.year;
  settings.scriptUrl   = document.getElementById('s-url')?.value || '';
  settings.disconnected = false;
  save();
  startPoll();
  logSync('Settings saved');
  document.getElementById('hdr-sub').textContent = settings.year + ' · ' + APP_VER;
}

function toggleDisconnect() {
  settings.disconnected = !settings.disconnected;
  save();
  renderSettings();
  logSync(settings.disconnected ? 'Sync disconnected' : 'Sync reconnected');
}

// -- SYNC --
function setSyncPill(cls, text) {
  const el = document.getElementById('sync-pill');
  el.className = cls;
  el.textContent = text;
}

function logSync(msg) {
  document.getElementById('sync-log').textContent = msg;
  const ta = document.getElementById('sync-log-area');
  if (ta) ta.value = new Date().toLocaleTimeString('en-NZ') + ' ' + msg + '\n' + ta.value;
}

function schedulePush() {
  if (!syncPending && settings.scriptUrl && !settings.disconnected) {
    syncPending = true;
    setTimeout(pushToSheet, 1500);
  }
}

async function pullFromSheet() {
  if (!settings.scriptUrl || settings.disconnected) { renderAll(); return; }
  setSyncPill('info', 'Pulling...');
  try {
    const res = await fetch(settings.scriptUrl + '?action=pull', { cache: 'no-store' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (Array.isArray(data.cropPlan)    && data.cropPlan.length)    cropPlan    = data.cropPlan;
    if (Array.isArray(data.stockReq)    && data.stockReq.length)    stockReq    = data.stockReq;
    if (Array.isArray(data.supplements) && data.supplements.length) supplements = data.supplements;
    if (Array.isArray(data.history)     && data.history.length)     history     = data.history;
    if (typeof data.aiNotes === 'string' && data.aiNotes)           aiNotes     = data.aiNotes;
    lastTs = data.lastModified || 0;
    localStorage.setItem(NS+'lastTs', lastTs);
    save();
    setSyncPill('ok', 'Synced');
    logSync('Pulled ' + new Date().toLocaleTimeString('en-NZ'));
  } catch(e) {
    setSyncPill('warn', 'Offline');
    logSync('Pull failed: ' + e.message);
  }
  renderAll();
}

async function pushToSheet() {
  if (!settings.scriptUrl || settings.disconnected) { syncPending = false; return; }
  try {
    const payload = { cropPlan, stockReq, supplements, history, aiNotes, clientTs: lastTs };
    const url = settings.scriptUrl + '?action=push&data=' + encodeURIComponent(JSON.stringify(payload));
    fetch(url, { mode: 'no-cors' }).catch(() => {});
    lastTs = Date.now();
    localStorage.setItem(NS+'lastTs', lastTs);
    setSyncPill('ok', 'Synced');
    logSync('Pushed ' + new Date().toLocaleTimeString('en-NZ'));
  } catch(e) {
    setSyncPill('warn', 'Push failed');
    logSync('Push failed: ' + e.message);
  }
  syncPending = false;
}

async function manualSync() {
  if (settings.disconnected) { logSync('Sync disconnected'); return; }
  await pullFromSheet();
}

function startPoll() {
  clearInterval(pollTimer);
  if (!settings.scriptUrl || settings.disconnected) return;
  pollTimer = setInterval(async () => {
    if (syncPending) return;
    try {
      const res = await fetch(settings.scriptUrl + '?action=pull', { cache: 'no-store' });
      const d = await res.json();
      if ((d.lastModified || 0) > lastTs) await pullFromSheet();
    } catch(e) {}
  }, 30000);
}

// -- INIT --
load();
renderAll();
if (settings.scriptUrl && !settings.disconnected) pullFromSheet();
else setSyncPill('', settings.scriptUrl ? 'Offline' : 'No URL');
startPoll();
</script>
</body>
</html>
